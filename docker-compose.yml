version: '3.8'

services:
  server:
    build: ./server
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=3001
      - CLIENT_URL=http://localhost
      - NODE_ENV=production
    healthcheck:
      test: [ 'CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/health' ]
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build: ./client
    ports:
      - '80:80'
    depends_on:
      server:
        condition: service_healthy
